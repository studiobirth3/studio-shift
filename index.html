// ── APP ──
function App(){
  // URLで ?staff= が含まれる場合はスタッフポータルモードで起動
  const isStaffMode=new URLSearchParams(window.location.search).has('staff')||
                    window.location.hash==='#staff';
  const[mode,setMode]=useState(isStaffMode?'staff_login':'admin');
  // 管理者認証状態（スタッフモードは認証不要）
  const[adminAuthed,setAdminAuthed]=useState(()=>{
    // セッション中はsessionStorageで認証維持
    return sessionStorage.getItem('sv_admin_authed')==='1';
  });
  const handleAdminLogin=()=>{
    sessionStorage.setItem('sv_admin_authed','1');
    setAdminAuthed(true);
  };
  const[loggedInStaff,setLoggedInStaff]=useState(null);
  const[page,setPage]=useState('dashboard');
  const[staff,setStaff]=useState([]);
  const[sharedSpec,setSharedSpec]=useState({});
  const[specK,setSpecK]=useState({});
  const[specT,setSpecT]=useState({});
  const[prefs,setPrefs]=useState({});
  const[shifts,setShifts]=useState({});
  const[ym,setYm]=useState(nowYM);
  const[loaded,setLoaded]=useState(false);
  const[syncStatus,setSyncStatus]=useState('idle'); // idle|syncing|ok|error
  const[lastSync,setLastSync]=useState('');

  // GASから最新データを取得してキャッシュ更新
  const syncFromGas=useCallback(async(silent=false)=>{
    if(!getGasUrl())return;
    if(!silent)setSyncStatus('syncing');
    const gasData=await gasLoadAll();
    if(gasData){
      const parse=(v,fb)=>{try{return v?JSON.parse(v):fb;}catch{return fb;}};
      const s=parse(gasData['sv_staff'],[]);
      const c=parse(gasData['sv_calendar'],{});
      const ck=parse(gasData['sv_calK'],{});
      const ct=parse(gasData['sv_calT'],{});
      const sh=parse(gasData['sv_shifts'],{});

      // 希望休：sv_prefsの既存データ＋sv_pref:*の個別キーを両方マージ
      const pBase=parse(gasData['sv_prefs'],{});
      // 個別キー（sv_pref:staffId_ym形式）をマージ
      const pMerged={...pBase};
      if(gasData){
        Object.keys(gasData).forEach(k=>{
          if(k.startsWith('sv_pref:')){
            const prefKey=k.slice(8); // "sv_pref:"を除いたstaffId_ym
            try{const v=gasData[k];if(v)pMerged[prefKey]=JSON.parse(v);}catch{}
          }
        });
      }

      setStaff(s);setSharedSpec(c);setSpecK(ck);setSpecT(ct);setPrefs(pMerged);setShifts(sh);
      lsSet('sv_staff',s);lsSet('sv_calendar',c);lsSet('sv_calK',ck);
      lsSet('sv_calT',ct);lsSet('sv_prefs',pMerged);lsSet('sv_shifts',sh);
      setSyncStatus('ok');
      setLastSync(new Date().toLocaleTimeString('ja-JP'));
    }else{
      setSyncStatus('error');
    }
  },[]);

  useEffect(()=>{
    (async()=>{
      // まずローカルキャッシュで即時表示
      const s=lsGet('sv_staff',[]);
      const c=lsGet('sv_calendar',{});
      const ck=lsGet('sv_calK',{});
      const ct=lsGet('sv_calT',{});
      const p=lsGet('sv_prefs',{});
      const sh=lsGet('sv_shifts',{});
      setStaff(s);setSharedSpec(c);setSpecK(ck);setSpecT(ct);setPrefs(p);setShifts(sh);
      setLoaded(true);
      // GAS設定済みならバックグラウンドで最新データを取得
      if(getGasUrl()){
        setSyncStatus('syncing');
        await syncFromGas(true);
      }
    })();
  },[]);

  const saveStaff=useCallback(async s=>{
    let next;
    setStaff(prev=>{next=prev.find(x=>x.id===s.id)?prev.map(x=>x.id===s.id?s:x):[...prev,s];return next;});
    setTimeout(()=>stSave('sv_staff',next||[]),0);
  },[]);
  const delStaff=useCallback(async id=>{
    let next;setStaff(prev=>{next=prev.filter(x=>x.id!==id);return next;});
    setTimeout(()=>stSave('sv_staff',next||[]),0);
  },[]);

  const handleImport=useCallback(async(type,data)=>{
    if(type==='staff'){
      setStaff(prev=>{
        const next=[...prev];
        data.forEach(ns=>{const idx=next.findIndex(s=>s.name===ns.name);if(idx>=0)next[idx]={...next[idx],...ns,id:next[idx].id};else next.push(ns);});
        stSave('sv_staff',next);return next;
      });
    }else{
      // LINE ID import
      setStaff(prev=>{
        const next=prev.map(s=>{
          const match=data.find(r=>(r['名前']||r['name']||Object.values(r)[0])===s.name);
          if(match){return{...s,lineId:match['LINE_UID']||match['LINE ID']||Object.values(match)[1]||s.lineId};}
          return s;
        });
        stSave('sv_staff',next);return next;
      });
    }
    alert(`インポート完了しました`);
  },[]);

  const setShared=useCallback(async(date,val)=>{
    setSharedSpec(prev=>{const next={...prev};val?next[date]=val:delete next[date];stSave('sv_calendar',next);return next;});
  },[]);
  const setFac=useCallback(async(fac,date,val)=>{
    if(fac==='kurashiki'){setSpecK(prev=>{const next={...prev};val?next[date]=val:delete next[date];stSave('sv_calK',next);return next;});}
    else{setSpecT(prev=>{const next={...prev};val?next[date]=val:delete next[date];stSave('sv_calT',next);return next;});}
  },[]);
  const setPref=useCallback(async(staffId,month,data)=>{
    // ローカルStateを更新
    setPrefs(prev=>{
      const next={...prev,[`${staffId}_${month}`]:data};
      lsSet('sv_prefs',next); // ローカルキャッシュも更新
      return next;
    });
    // GASには個別キーで保存（他スタッフのデータを上書きしない）
    const url=getGasUrl();
    if(url){
      const by=lsGet('sv_settings',{}).operatorName||staffId;
      gasSetPref(staffId,month,data,by).catch(()=>{});
    }
  },[]);
  const saveShifts=useCallback(async(month,data)=>{
    setShifts(prev=>{const next={...prev,[month]:data};stSave('sv_shifts',next);return next;});
  },[]);

  const nav=[
    {id:'dashboard',l:'ダッシュボード',ic:'◈'},
    {id:'staff',l:'スタッフ管理',ic:'◎'},
    {id:'calendar',l:'カレンダー設定',ic:'◷'},
    {id:'timeline',l:'タイムライン',ic:'▦'},
    {id:'prefs',l:'希望休管理',ic:'◻'},
    {id:'shifts',l:'シフト管理',ic:'◫'},
    {id:'settings',l:'設定',ic:'⚙'},
  ];

  // GAS URL未設定かつローカルにもデータがない場合 → 初期設定画面
  if(!loaded) return ce('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#F8FAFC',fontFamily:'var(--font-sans)'}},
    ce('div',{style:{textAlign:'center',padding:40}},
      ce('div',{style:{fontSize:40,marginBottom:16}},'⏳'),
      ce('div',{style:{fontSize:16,fontWeight:600,color:'#374151',marginBottom:8}},'読み込み中…'),
      ce('div',{style:{fontSize:13,color:'#9CA3AF'}},getGasUrl()?'GASからデータを取得しています':'しばらくお待ちください')
    )
  );

  // スタッフポータルモード分岐
  if(mode==='staff_login'){
    return ce(StaffLoginPage,{staff,onLogin:s=>{setLoggedInStaff(s);setMode('staff_portal');}});
  }
  if(mode==='staff_portal'&&loggedInStaff){
    return ce(StaffPortalPage,{
      staffMember:loggedInStaff,ym,setYm,prefs,
      onSavePref:setPref,
      onLogout:()=>{setLoggedInStaff(null);setMode('staff_login');}
    });
  }


  // 管理者認証チェック（スタッフモードはスキップ）
  if(!isStaffMode&&mode==='admin'&&!adminAuthed){
    return ce(AdminLoginPage,{onLogin:handleAdminLogin});
  }

  if(!getGasUrl()) return ce('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#F8FAFC',fontFamily:'var(--font-sans)'}},
    ce('div',{style:{background:'#fff',borderRadius:16,border:'2px solid #E2E8F0',padding:40,maxWidth:520,width:'100%',boxShadow:'0 4px 24px rgba(0,0,0,0.08)'}},
      ce('div',{style:{fontSize:32,marginBottom:16,textAlign:'center'}},'🔗'),
      ce('div',{style:{fontSize:20,fontWeight:800,color:'#0F2D52',marginBottom:8,textAlign:'center'}},'初期設定が必要です'),
      ce('div',{style:{fontSize:14,color:'#6B7280',marginBottom:24,textAlign:'center',lineHeight:1.6}},'HTMLファイルの9行目に GAS URL を設定してください'),
      ce('div',{style:{background:'#F8FAFC',borderRadius:10,padding:16,fontFamily:'monospace',fontSize:12,color:'#374151',marginBottom:20,lineHeight:2}},
        ce('div',{style:{color:'#9CA3AF'}},'// studio_verse_shift_app_v2.html の9行目'),
        ce('div',null,'const HARDCODED_GAS_URL = '),
        ce('div',{style:{color:'#059669',fontWeight:700}},"  'https://script.google.com/macros/s/xxxxx/exec';")
      ),
      ce('div',{style:{background:'#EFF6FF',borderRadius:10,padding:16,fontSize:13,color:'#1E40AF',lineHeight:1.8}},
        ce('div',{style:{fontWeight:700,marginBottom:6}},'📋 設定手順'),
        ce('div',null,'① HTMLファイルをテキストエディタで開く'),
        ce('div',null,'② 9行目の \'\' にGAS URLを貼り付ける'),
        ce('div',null,'③ 保存してGitHubに再アップロード'),
        ce('div',null,'④ どのブラウザからでも自動でGASに繋がります')
      )
    )
  );

  const syncColor=syncStatus==='ok'?'#4ADE80':syncStatus==='error'?'#F87171':syncStatus==='syncing'?'#FCD34D':'rgba(255,255,255,0.3)';
  const syncLabel=syncStatus==='ok'?'✓ 同期済 '+lastSync:syncStatus==='error'?'⚠ GAS接続エラー':syncStatus==='syncing'?'↻ 同期中…':'GAS未設定';

  return ce('div',{style:{display:'flex',minHeight:600,fontFamily:'var(--font-sans)',fontSize:14,color:'var(--color-text-primary)'}},
    ce('div',{style:{width:186,background:'#0F2D52',flexShrink:0,display:'flex',flexDirection:'column'}},
      ce('div',{style:{padding:'14px 14px',borderBottom:'1px solid rgba(255,255,255,0.1)'}},
        ce('div',{style:{color:'#93C5FD',fontSize:11,fontWeight:500,marginBottom:2}},'スタジオバース'),
        ce('div',{style:{color:'#fff',fontSize:13,fontWeight:600}},'シフト管理 v2')
      ),
      ce('nav',{style:{flex:1,padding:'6px 0'}},
        nav.map(n=>ce('button',{key:n.id,onClick:()=>setPage(n.id),style:{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'9px 14px',background:page===n.id?'rgba(255,255,255,0.12)':'transparent',border:'none',cursor:'pointer',color:page===n.id?'#fff':'rgba(255,255,255,0.65)',fontSize:12,fontWeight:page===n.id?500:400,fontFamily:'inherit',textAlign:'left',borderLeft:page===n.id?'3px solid #60A5FA':'3px solid transparent',transition:'all .15s'}},
          ce('span',{style:{fontSize:14}},n.ic),n.l))
      ),
      ce('div',{style:{padding:'6px 10px',borderTop:'1px solid rgba(255,255,255,0.08)'}},
        ce('button',{
          onClick:()=>{
            if(confirm('管理者からログアウトしますか？')){
              sessionStorage.removeItem('sv_admin_authed');
              setAdminAuthed(false);
            }
          },
          style:{width:'100%',padding:'6px 10px',borderRadius:8,
            border:'1px solid rgba(255,255,255,0.15)',
            background:'rgba(239,68,68,0.12)',color:'rgba(255,200,200,0.85)',
            fontSize:11,cursor:'pointer',fontFamily:'inherit',
            display:'flex',alignItems:'center',gap:5,marginBottom:4}
        },'🔓 ログアウト')
      ),
      ce('div',{style:{padding:'6px 10px',borderTop:'none'}},ce('button',{onClick:()=>setMode('staff_login'),style:{width:'100%',padding:'7px 10px',borderRadius:8,border:'1px solid rgba(255,255,255,0.2)',background:'rgba(255,255,255,0.06)',color:'rgba(255,255,255,0.75)',fontSize:12,cursor:'pointer',fontFamily:'inherit',fontWeight:500,display:'flex',alignItems:'center',gap:6}},'👤 スタッフ入力ページへ')),ce('div',{style:{padding:'8px 12px',borderTop:'1px solid rgba(255,255,255,0.1)'}},ce('div',{style:{fontSize:9,color:syncColor,marginBottom:3,lineHeight:1.4}},syncLabel),getGasUrl()&&ce('button',{onClick:()=>syncFromGas(),style:{fontSize:9,color:'rgba(255,255,255,0.5)',background:'transparent',border:'1px solid rgba(255,255,255,0.2)',borderRadius:4,padding:'2px 8px',cursor:'pointer',fontFamily:'inherit',width:'100%'}},'🔄 今すぐ同期'))
    ),
    ce('div',{style:{flex:1,overflow:'auto',background:'var(--color-background-tertiary)'}},
      ce('div',{style:{maxWidth:1100,padding:20}},
        page==='dashboard'&&ce(Dashboard,{staff,prefs,shifts,sharedSpec,specK,specT,ym}),
        page==='staff'&&ce(StaffPage,{staff,onSave:saveStaff,onDelete:delStaff,onImport:handleImport}),
        page==='calendar'&&ce(CalendarPage,{ym,setYm,sharedSpec,specK,specT,onSetShared:setShared,onSetFac:setFac}),
        page==='timeline'&&ce(TimelinePage,{ym,setYm,staff,shiftData:shifts[ym],sharedSpec,specK,specT,onSaveShifts:saveShifts,shifts}),
        page==='prefs'&&ce(PrefsPage,{ym,setYm,staff,prefs,onSetPref:setPref,onRefreshPrefs:p=>setPrefs(p)}),
        page==='shifts'&&ce(ShiftsPage,{ym,setYm,staff,sharedSpec,specK,specT,prefs,shifts,onSaveShifts:saveShifts}),
        page==='settings'&&ce(SettingsPage,{syncFromGas,syncStatus})
      )
    )
  );
}
ReactDOM.render(ce(App),document.getElementById('root'));
</script>
