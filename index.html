// ── SHIFT LOGIC ──
function getRequiredShifts(fac,dt){
  if(dt==='closed')return[];
  if(dt==='weekday')return[{code:'A1',role:'general'},{code:'清掃1',role:'cleaning'},{code:'清掃2',role:'cleaning'}];
  const weekend=[{code:'早番',role:'general'},{code:'遅番',role:'general'},{code:'清掃2',role:'cleaning'}];
  if(fac==='kurashiki')return[{code:'早番',role:'general'},{code:'遅番',role:'general'},{code:'清掃1',role:'cleaning'},{code:'清掃2',role:'cleaning'}];
  return weekend;
}
function ds(yr,mo,d){return`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function getDayTypeFac(yr,mo,d,shared,facSpec){
  const date=ds(yr,mo,d);
  if(shared[date]?.type==='closed'||facSpec[date]?.type==='closed')return'closed';
  if(shared[date]?.type==='holiday')return'holiday';
  const dow=new Date(yr,mo-1,d).getDay();
  if(dow===0)return'sunday';if(dow===6)return'saturday';return'weekday';
}
function generateShifts(ym,staffList,sharedSpec,specK,specT,allPrefs){
  const[yr,mo]=ym.split('-').map(Number);
  const dim=new Date(yr,mo,0).getDate();
  const facSpec={kurashiki:specK||{},tonya:specT||{}};
  const entries={},alerts=[],workDays={},consec={};
  staffList.forEach(s=>{workDays[s.id]=0;consec[s.id]={count:0,last:null};});
  for(let d=1;d<=dim;d++){
    const date=ds(yr,mo,d);entries[date]=[];
    if(sharedSpec[date]?.type==='closed'){
      staffList.forEach(s=>entries[date].push({staffId:s.id,facility:null,shiftCode:'休'}));
      staffList.forEach(s=>{consec[s.id]={count:0,last:null};});continue;
    }
    const dow=new Date(yr,mo-1,d).getDay();
    const assignedAll=new Set();
    const isAvail=(s)=>{
      if(consec[s.id].count>=11)return false;
      if(s.availableDays&&s.availableDays.length>0&&!s.availableDays.includes(dow))return false;
      const pref=allPrefs[`${s.id}_${ym}`];
      if(s.inputMethod==='希望休'){if(pref?.dates?.includes(date))return false;}
      else{if(pref&&pref.dates&&!pref.dates.includes(date))return false;}
      return true;
    };
    const scoreOf=(s)=>{
      const step=Math.min(s.step||1,5);const score=step>=5?4:Math.max(0,step-1);
      const weeks=Math.max(1,Math.ceil(d/7));const exp=s.weeklyMinDays*weeks;
      return{score,rate:exp>0?workDays[s.id]/exp:1};
    };
    FAC_LIST.forEach(fac=>{
      const dayType=getDayTypeFac(yr,mo,d,sharedSpec,facSpec[fac]);
      if(dayType==='closed')return;
      const isEv=sharedSpec[date]?.type==='event'||facSpec[fac][date]?.type==='event';
      const shifts=getRequiredShifts(fac,dayType);
      const allShifts=isEv?[...shifts,{code:'用意',role:'event'},{code:'本番',role:'event'}]:shifts;
      const facAssigned=new Set();
      allShifts.forEach(({code,role})=>{
        const cands=staffList.filter(s=>{
          if(!s.facilities?.includes(fac))return false;
          if(assignedAll.has(s.id)||facAssigned.has(s.id))return false;
          if(!isAvail(s))return false;
          if(role==='cleaning')return s.roles?.includes('cleaning');
          if(role==='event')return s.roles?.includes('event');
          return s.roles?.includes('general');
        });
        cands.sort((a,b)=>{const sa=scoreOf(a),sb=scoreOf(b);if(sb.score!==sa.score)return sb.score-sa.score;return sa.rate-sb.rate;});
        if(cands.length===0){
          const fb=getDayTypeFac(yr,mo,d,sharedSpec,facSpec[fac])==='weekday'?'A1':'遅番';
          alerts.push({id:Math.random(),type:code==='清掃2'?'cleaning2':'no_staff',date,facility:fac,
            msg:code==='清掃2'?`${FAC_NAME[fac]} ${date} 清掃2不在→${fb}が代替`:`${FAC_NAME[fac]} ${date} ${code}に配置できるスタッフがいません`});
          return;
        }
        const pick=cands[0];
        entries[date].push({staffId:pick.id,facility:fac,shiftCode:code});
        assignedAll.add(pick.id);facAssigned.add(pick.id);workDays[pick.id]++;
        const prevDate=ds(yr,mo,d-1);
        if(consec[pick.id].last===prevDate)consec[pick.id].count++;else consec[pick.id].count=1;
        consec[pick.id].last=date;
        if(consec[pick.id].count>11)alerts.push({id:Math.random(),type:'consecutive',staffId:pick.id,msg:`${staffList.find(s=>s.id===pick.id)?.name} 連続勤務${consec[pick.id].count}日 (${date})`});
      });
    });
    staffList.forEach(s=>{
      if(!assignedAll.has(s.id)){
        const pref=allPrefs[`${s.id}_${ym}`];
        const isKibou=s.inputMethod==='希望休'&&pref?.dates?.includes(date);
        entries[date].push({staffId:s.id,facility:null,shiftCode:isKibou?'希':'休'});
        consec[s.id]={count:0,last:null};
      }
    });
  }
  staffList.forEach(s=>{
    if((s.monthlyMinDays||0)>0&&workDays[s.id]<s.monthlyMinDays)
      alerts.push({id:Math.random(),type:'monthly_min',staffId:s.id,msg:`${s.name} 月出勤日数不足: ${workDays[s.id]}日/最低${s.monthlyMinDays}日`});
  });
  return{entries,alerts};
}

// ── STORAGE（GAS + localStorage ハイブリッド）──
const GAS_URL_KEY='sv_gas_url';
function getGasUrl(){return HARDCODED_GAS_URL||localStorage.getItem(GAS_URL_KEY)||'';}
function setGasUrl(url){localStorage.setItem(GAS_URL_KEY,url);}

// GASへGET（データ読み込み）
async function gasGet(params){
  const url=getGasUrl();if(!url)return null;
  try{
    const qs=new URLSearchParams(params).toString();
    const res=await fetch(url+'?'+qs,{redirect:'follow'});
    return await res.json();
  }catch(e){console.warn('GAS GET error:',e);return null;}
}
// GASへPOST（FormData方式でCORSプリフライト回避）
async function gasPost(body){
  const url=getGasUrl();if(!url)return null;
  try{
    const fd=new FormData();
    fd.append('payload',JSON.stringify(body));
    const res=await fetch(url,{method:'POST',body:fd,redirect:'follow'});
    return await res.json();
  }catch(e){
    // FormDataが失敗したらno-corsで送信（書き込みのみ、レスポンスなし）
    try{
      fetch(url+'?action=set&key='+encodeURIComponent(body.key)+'&nocheck=1',
        {method:'POST',body:JSON.stringify(body),mode:'no-cors'});
    }catch(_){}
    return null;
  }
}
async function gasLoadAll(){
  const r=await gasGet({action:'getAll'});
  if(!r||!r.ok)return null;
  return r.data;
}
// 希望休1件だけGASから取得
async function gasGetPref(staffId,ym){
  const key='sv_pref:'+staffId+'_'+ym;
  const r=await gasGet({action:'get',key});
  if(!r||!r.ok||!r.value)return null;
  try{return JSON.parse(r.value);}catch{return null;}
}
// 希望休1件だけGASへ保存（全体を上書きしない）
async function gasSetPref(staffId,ym,data,by){
  const key='sv_pref:'+staffId+'_'+ym;
  return await gasPost({action:'set',key,value:JSON.stringify(data),updatedBy:by||'staff'});
}
// GASから全希望休を取得してローカルのprefsオブジェクトに変換
async function gasLoadAllPrefs(){
  // sv_pref:* のキー一覧を取得（GASのgetAllで返ってくるkeyの中からフィルタ）
  const r=await gasGet({action:'getAll'});
  if(!r||!r.ok)return null;
  const result={};
  // 既存のsv_prefsも読む（後方互換）
  if(r.data&&r.data['sv_prefs']){
    try{const p=JSON.parse(r.data['sv_prefs']);Object.assign(result,p);}catch{}
  }
  return result;
}
function lsGet(k,fb){try{const r=localStorage.getItem(k);return r?JSON.parse(r):fb;}catch{return fb;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
async function stLoad(k,fb){return lsGet(k,fb);}
async function stSave(k,v){
  lsSet(k,v);
  const url=getGasUrl();
  if(url){
    const by=lsGet('sv_settings',{}).operatorName||'admin';
    gasPost({action:'set',key:k,value:JSON.stringify(v),updatedBy:by}).catch(()=>{});
  }
}

// ── CSV UTILS ──
function parseCSV(text){
  const lines=text.trim().split('\n').filter(l=>l.trim());
  if(lines.length<2)return[];
  const headers=lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
  return lines.slice(1).map(line=>{
    const vals=line.split(',').map(v=>v.trim().replace(/"/g,''));
    const obj={};headers.forEach((h,i)=>obj[h]=vals[i]||'');return obj;
  });
}
function csvRowToStaff(row){
  const fMap={'倉敷':'kurashiki','問屋町':'tonya','両施設':['kurashiki','tonya']};
  const rMap={'一般':'general','清掃':'cleaning','清掃専任':'cleaning','イベント':'event','イベント担当':'event'};
  const facRaw=row['施設']||row['対応施設']||'倉敷';
  const facilities=Array.isArray(fMap[facRaw])?fMap[facRaw]:[fMap[facRaw]||'kurashiki'];
  const roleRaw=row['役割']||'一般';
  const roles=roleRaw.split('/').map(r=>rMap[r.trim()]).filter(Boolean);
  return{
    id:`s_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,
    name:row['氏名']||row['名前']||'',
    title:row['肩書']||'',
    facilities,
    priorityFacility:facilities[0],
    roles:roles.length>0?roles:['general'],
    step:parseInt(row['STEP']||row['ステップ'])||1,
    weeklyMinDays:parseInt(row['週最低出勤']||row['週最低出勤日数'])||5,
    monthlyMinDays:parseInt(row['月最低出勤']||row['月最低出勤日数'])||20,
    availableDays:[0,1,2,3,4,5,6],
    inputMethod:(row['希望方式']||row['希望入力方式']||'').includes('出勤')?'希望出勤':'希望休',
    lineId:row['LINE_ID']||row['LINE ID']||row['lineId']||'',
  };
}

function CSVImportModal({onImport,onClose}){
  const[mode,setMode]=useState('staff');// staff | lineid
  const[preview,setPreview]=useState(null);
  const[linePreview,setLinePreview]=useState(null);
  const fileRef=useRef();

  const handleFile=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const rows=parseCSV(ev.target.result);
      if(mode==='staff'){
        const parsed=rows.map(csvRowToStaff).filter(s=>s.name);
        setPreview(parsed);setLinePreview(null);
      }else{
        // LINE ID import: match by name
        setLinePreview(rows);setPreview(null);
      }
    };

// ── CALENDAR PAGE（施設別）──
function CalendarPage({ym,setYm,sharedSpec,specK,specT,onSetShared,onSetFac}){
  const[yr,mo]=ym.split('-').map(Number);
  const dim=new Date(yr,mo,0).getDate();
  const first=new Date(yr,mo-1,1).getDay();
  const[tab,setTab]=useState('shared');// shared | kurashiki | tonya
  const[selType,setSelType]=useState('holiday');

  const getSpec=()=>{if(tab==='shared')return sharedSpec;if(tab==='kurashiki')return specK;return specT;};
  const setSpec=tab==='shared'?onSetShared:(d,v)=>onSetFac(tab,d,v);
  const spec=getSpec();

  const toggle=(d)=>{
    const date=ds(yr,mo,d);
    const cur=spec[date];
    if(cur?.type===selType){setSpec(date,null);}
    else{setSpec(date,{type:selType});}
  };

  const prev=()=>mo===1?(setYm(`${yr-1}-12`)):(setYm(`${yr}-${String(mo-1).padStart(2,'0')}`));
  const next=()=>mo===12?(setYm(`${yr+1}-01`)):(setYm(`${yr}-${String(mo+1).padStart(2,'0')}`));

  const typeOptions=tab==='shared'?[{v:'holiday',l:'🎌 祝日',c:'#B91C1C',bg:'#FEE2E2'},{v:'closed',l:'🔒 全体休業',c:'#6B7280',bg:'#F3F4F6'}]
    :[{v:'closed',l:'🔒 休業日',c:'#6B7280',bg:'#F3F4F6'},{v:'event',l:'🎪 イベント',c:'#9D174D',bg:'#FCE7F3'}];

  const getCellStyle=(d)=>{
    const date=ds(yr,mo,d);const dow=new Date(yr,mo-1,d).getDay();
    const sharedType=sharedSpec[date]?.type;
    const facType=tab!=='shared'?spec[date]?.type:null;
    let bg='transparent',color=dow===0?'#EF4444':dow===6?'#3B82F6':'var(--color-text-primary)',border='1px solid transparent',fw=400;
    const type=facType||sharedType;
    if(type==='closed'){bg='#F3F4F6';color='#9CA3AF';border='1px solid #D1D5DB';}
    else if(type==='event'){bg='#FCE7F3';color='#9D174D';border='1px solid #F9A8D4';}
    else if(type==='holiday'){bg='#FEE2E2';color='#B91C1C';border='1px solid #FECACA';}
    if(facType&&sharedType&&facType!==sharedType)fw=700;
    return{background:bg,color,border,fontWeight:fw,borderRadius:8,padding:'8px 4px',textAlign:'center',fontSize:13,cursor:'pointer',transition:'opacity .1s'};
  };

  return ce('div',null,
    ce('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
      ce('h2',{style:{fontSize:18,fontWeight:600,margin:0}},'カレンダー設定'),
      ce('div',{style:{display:'flex',alignItems:'center',gap:8}},
        ce('button',{onClick:prev,style:{padding:'4px 10px',borderRadius:6,border:'1px solid var(--color-border-secondary)',background:'transparent',cursor:'pointer'}},'◀'),
        ce('span',{style:{fontSize:15,fontWeight:600,minWidth:90,textAlign:'center'}},`${yr}年${mo}月`),
        ce('button',{onClick:next,style:{padding:'4px 10px',borderRadius:6,border:'1px solid var(--color-border-secondary)',background:'transparent',cursor:'pointer'}},'▶')
      )
    ),
    ce('div',{style:{display:'flex',gap:6,marginBottom:16}},
      [{id:'shared',label:'共通（祝日）'},{id:'kurashiki',label:'🏢 倉敷'},{id:'tonya',label:'🏢 問屋町'}].map(t=>
        ce('button',{key:t.id,onClick:()=>{setTab(t.id);setSelType(t.id==='shared'?'holiday':'closed');},
          style:{padding:'6px 14px',borderRadius:8,border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:tab===t.id?600:400,
            background:tab===t.id?NAVY:'var(--color-background-secondary)',color:tab===t.id?'#fff':'var(--color-text-primary)'}},t.label)
      )
    ),
    ce('div',{style:{display:'flex',gap:8,marginBottom:14}},
      typeOptions.map(o=>ce('button',{key:o.v,onClick:()=>setSelType(o.v),
        style:{padding:'5px 12px',borderRadius:6,border:`1px solid ${o.c}`,cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:selType===o.v?600:400,
          background:selType===o.v?o.bg:'transparent',color:o.c}},o.l))
    ),
    ce('div',{style:{border:'1px solid var(--color-border-tertiary)',borderRadius:10,padding:16,marginBottom:14}},
      ce('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,marginBottom:6}},
        DAYS.map((d,i)=>ce('div',{key:d,style:{textAlign:'center',fontSize:12,fontWeight:600,padding:'4px 0',color:i===0?'#EF4444':i===6?'#3B82F6':'var(--color-text-secondary)'}},d))
      ),
      ce('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}},
        Array.from({length:first}).map((_,i)=>ce('div',{key:'e'+i})),
        Array.from({length:dim},(_,i)=>{
          const d=i+1,date=ds(yr,mo,d);
          const cs=getCellStyle(d);
          const hasSharedMark=tab!=='shared'&&sharedSpec[date];
          return ce('div',{key:d,onClick:()=>toggle(d),style:cs,
            onMouseEnter:e=>e.currentTarget.style.opacity='0.7',
            onMouseLeave:e=>e.currentTarget.style.opacity='1'},
            d,
            hasSharedMark&&ce('span',{style:{position:'absolute',top:1,right:2,width:5,height:5,borderRadius:'50%',background:'#F59E0B',display:'inline-block',marginLeft:2,fontSize:8}},'')
          );
        })
      )
    ),
    tab==='shared'&&ce('p',{style:{fontSize:12,color:'var(--color-text-secondary)',textAlign:'center'}},'クリックで祝日/全体休業を設定'),
    tab!=='shared'&&ce('p',{style:{fontSize:12,color:'var(--color-text-secondary)',textAlign:'center'}},`クリックで${FAC_NAME[tab]}の休業日/イベント日を設定（共通祝日は共通タブで設定）`)
  );
}

// ── TIMELINE PDF EXPORT ──
function exportTimelinePDF(ym, staff, shiftData, sharedSpec, specK, specT, selFac){
  if(!shiftData?.entries){alert('シフトがまだ生成されていません');return;}
  const[yr,mo]=ym.split('-').map(Number);
  const dim=new Date(yr,mo,0).getDate();
  const facSpec={kurashiki:specK||{},tonya:specT||{}};
  const entries=shiftData.entries;
  const dowJP=['日','月','火','水','木','金','土'];
  const getName=id=>staff.find(s=>s.id===id)?.name||'?';
  const showFacs=selFac==='both'?['kurashiki','tonya']:selFac==='kurashiki'?['kurashiki']:['tonya'];

  // ガントバー色
  const GCOL={
    'A1':'#93C5FD','早番':'#6EE7B7','遅番':'#C4B5FD',
    '清掃1':'#FDE68A','清掃2':'#FCA5A5','用意':'#F9A8D4','本番':'#F87171'
  };
  // 横軸: 7〜25時（18h）
  const GSTART=7,GEND=25,GSPAN=18;
  const pct=h=>((h-GSTART)/GSPAN*100).toFixed(2)+'%';
  const wPct=(s,e)=>((e-s)/GSPAN*100).toFixed(2)+'%';

  const getHoursLocal=(code,fac)=>{
    const map={
      'A1':     {kurashiki:[19,24],tonya:[19,22]},
      '早番':    {both:[10,19]},
      '遅番':    {kurashiki:[19,24],tonya:[19,22]},
      '清掃1':   {kurashiki:[8.5,11.5],tonya:[10,13]},
      '清掃2':   {kurashiki:[22,24.5],tonya:[22,24]},
      '用意':    {both:[7.5,24.5]},
      '本番':    {both:[18,22]},
    };
    const h=map[code];if(!h)return null;
    return h.both||h[fac]||null;
  };
  const fmt=h=>`${Math.floor(h)}:${String(Math.round((h%1)*60)).padStart(2,'0')}`;

  // 時刻ヘッダHTML（7〜25）
  let timeHeader='';
  for(let h=GSTART;h<=GEND;h++){
    const l=h>=24?`${h-24}:00`:`${h}:00`;
    const lp=pct(h);
    timeHeader+=`<div class="th" style="left:${lp}">${l}</div>`;
  }
  // グリッド縦線HTML
  let gridLines='';
  for(let h=GSTART+1;h<GEND;h++) gridLines+=`<div class="gl" style="left:${pct(h)}"></div>`;

  // 全日の行HTML
  let rowsHtml='';
  for(let d=1;d<=dim;d++){
    const date=ds(yr,mo,d);
    const dow=new Date(yr,mo-1,d).getDay();
    const isHol=sharedSpec[date]?.type==='holiday';
    const isAllClosed=sharedSpec[date]?.type==='closed';
    const isSun=dow===0; const isSat=dow===6;
    const dayEnt=entries[date]||[];
    const dayLabel=`${mo}/${d}`;
    const dowLabel=dowJP[dow]+(isHol?'祝':'');
    const dayColor=isSun||isHol?'#DC2626':isSat?'#2563EB':'#374151';
    const rowBgDay=isSun||isHol?'#FFF0F0':isSat?'#F0F4FF':'#FFFFFF';

    // 施設ごとの行を生成
    showFacs.forEach(fac=>{
      const isFacClosed=facSpec[fac][date]?.type==='closed';
      const facEntries=dayEnt.filter(e=>e.facility===fac);
      const facLabel=fac==='kurashiki'?'倉':'問';
      const facColor=fac==='kurashiki'?'#1D4ED8':'#7C3AED';
      const facBg=fac==='kurashiki'?'#DBEAFE':'#EDE9FE';

      if(isAllClosed||isFacClosed){
        rowsHtml+=`
          <div class="row" style="background:${rowBgDay}">
            <div class="cell-day" style="color:${dayColor}">${dayLabel}<br><span class="dow-lbl">${dowLabel}</span></div>
            <div class="cell-fac"><span class="fac-badge" style="color:${facColor};background:${facBg}">${facLabel}</span></div>
            <div class="cell-name" style="color:#9CA3AF">休業日</div>
            <div class="cell-gantt"></div>
          </div>`;
        return;
      }

      if(facEntries.length===0){
        rowsHtml+=`
          <div class="row" style="background:${rowBgDay}">
            <div class="cell-day" style="color:${dayColor}">${dayLabel}<br><span class="dow-lbl">${dowLabel}</span></div>
            <div class="cell-fac"><span class="fac-badge" style="color:${facColor};background:${facBg}">${facLabel}</span></div>
            <div class="cell-name" style="color:#D1D5DB">—</div>
            <div class="cell-gantt">${gridLines}</div>
          </div>`;
        return;
      }

      facEntries.forEach((e,ei)=>{
        const hrs=getHoursLocal(e.shiftCode,fac);
        const barHtml=hrs?`
          <div class="bar" style="left:${pct(hrs[0])};width:${wPct(hrs[0],hrs[1])};background:${GCOL[e.shiftCode]||'#CBD5E1'}">
            <span class="bar-label">${e.shiftCode}</span>
          </div>`:'';
        rowsHtml+=`
          <div class="row" style="background:${rowBgDay}">
            ${ei===0?`<div class="cell-day" style="color:${dayColor}">${dayLabel}<br><span class="dow-lbl">${dowLabel}</span>`
                    :`<div class="cell-day" style="color:${dayColor}">`}
            </div>
            <div class="cell-fac"><span class="fac-badge" style="color:${facColor};background:${facBg}">${facLabel}</span></div>
            <div class="cell-name">${getName(e.staffId)}</div>
            <div class="cell-gantt">${gridLines}${barHtml}</div>
          </div>`;
      });
    });
  }

  const facTitle=selFac==='both'?'両施設':selFac==='kurashiki'?'倉敷':'問屋町';

  const html=`<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>タイムライン ${yr}年${mo}月</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Hiragino Kaku Gothic ProN','Meiryo','Yu Gothic',sans-serif;font-size:9px;background:#fff;color:#1a1a1a;padding:5mm;}
  @page{size:A4 landscape;margin:7mm 5mm;}
  @media print{body{padding:0;}-webkit-print-color-adjust:exact;print-color-adjust:exact;}

  .page-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:4mm;padding-bottom:2mm;border-bottom:2px solid #0F2D52;}
  .title{font-size:14px;font-weight:700;color:#0F2D52;}
  .subtitle{font-size:9px;color:#6B7280;margin-top:2px;}
  .meta{font-size:7px;color:#9CA3AF;text-align:right;}

  .gantt-wrap{font-size:8px;}

  /* 列幅定義 */
  .row{display:flex;align-items:stretch;border-bottom:0.3px solid #E5E7EB;min-height:18px;}
  .row:nth-child(even){background-blend-mode:multiply;}
  .cell-day{width:11mm;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;align-items:center;font-weight:700;font-size:8px;border-right:0.5px solid #E5E7EB;padding:1px 0;line-height:1.3;}
  .dow-lbl{font-size:6.5px;font-weight:400;}
  .cell-fac{width:6mm;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-right:0.5px solid #E5E7EB;}
  .fac-badge{font-size:7px;font-weight:700;padding:1px 2px;border-radius:2px;}
  .cell-name{width:16mm;flex-shrink:0;display:flex;align-items:center;padding:0 2px;font-size:8px;font-weight:600;border-right:0.5px solid #E5E7EB;overflow:hidden;white-space:nowrap;}
  .cell-gantt{flex:1;position:relative;overflow:hidden;}

  /* グリッド縦線 */
  .gl{position:absolute;top:0;bottom:0;border-left:0.3px solid #F1F5F9;}
  /* 時刻ヘッダ */
  .time-header{display:flex;margin-bottom:1mm;padding-left:${11+6+16}mm;position:relative;height:8px;}
  .th{position:absolute;font-size:6.5px;color:#64748B;transform:translateX(-50%);white-space:nowrap;}
  /* ガントバー */
  .bar{position:absolute;top:2px;bottom:2px;border-radius:3px;display:flex;align-items:center;padding-left:2px;min-width:4px;}
  .bar-label{font-size:6.5px;font-weight:700;color:#1E293B;white-space:nowrap;overflow:hidden;}

  /* 凡例 */
  .legend{display:flex;flex-wrap:wrap;gap:4mm;margin-top:3mm;padding-top:2mm;border-top:0.5px solid #E5E7EB;}

// ── TIMELINE HELPERS ──
function hToStr(h){const hh=Math.floor(h)%24;const mm=Math.round((h%1)*60);return`${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;}
function strToH(s){const[hh,mm]=(s||'').split(':').map(Number);if(isNaN(hh))return null;return hh+(mm||0)/60;}
function toDisplay(h){return h>=24?`翌${hToStr(h-24)}`:hToStr(h);}

const GANTT_START=7,GANTT_END=25,GANTT_SPAN=18;
function pct(h){return((h-GANTT_START)/GANTT_SPAN*100).toFixed(3);}

// シフト時間定義（小数時）
const SHIFT_HOURS={
  'A1':    {kurashiki:[19,24],   tonya:[19,22]},
  '早番':   {both:[10,19]},
  '遅番':   {kurashiki:[19,24],   tonya:[19,22]},
  '清掃1':  {kurashiki:[8.5,11.5],tonya:[10,13]},
  '清掃2':  {kurashiki:[22,24.5], tonya:[22,24]},
  '用意':   {both:[7.5,24.5]},
  '本番':   {both:[18,22]},
};
function getHours(code,fac){const h=SHIFT_HOURS[code];if(!h)return null;return h.both||h[fac]||null;}

// ガントバー色
const GANTT_COLORS={
  'A1':'#93C5FD','早番':'#6EE7B7','遅番':'#C4B5FD',
  '清掃1':'#FDE68A','清掃2':'#FCA5A5','用意':'#F9A8D4','本番':'#F87171',
};

// ── TIMELINE EDIT MODAL ──
function TimelineEditModal({date,fac,entry,entryIdx,staff,shiftData,onSave,onDelete,onClose}){
  const facStaff=staff.filter(s=>s.facilities?.includes(fac));
  const[code,setCode]=useState(entry?.shiftCode||'A1');
  const[staffId,setStaffId]=useState(entry?.staffId||'');
  const defaultHrs=(()=>{if(entry?.customHours)return entry.customHours;const h=SHIFT_HOURS[entry?.shiftCode||'A1'];if(!h)return[9,18];return(h.both||h[fac]||[9,18]);})();
  const[startStr,setStartStr]=useState(hToStr(defaultHrs[0]));
  const[endStr,setEndStr]=useState(hToStr(defaultHrs[1]>24?defaultHrs[1]-24:defaultHrs[1]));
  const[endNext,setEndNext]=useState(defaultHrs[1]>=24);
  const changeCode=c=>{setCode(c);const h=SHIFT_HOURS[c];if(h){const hrs=h.both||h[fac]||null;if(hrs){setStartStr(hToStr(hrs[0]));setEndNext(hrs[1]>=24);setEndStr(hToStr(hrs[1]>=24?hrs[1]-24:hrs[1]));}}};
  const getStartH=()=>strToH(startStr)||0;
  const getEndH=()=>{const h=strToH(endStr)||0;return endNext?h+24:h;};
  const duration=()=>{const d=getEndH()-getStartH();if(d<=0)return'—';const h=Math.floor(d);const m=Math.round((d%1)*60);return m>0?`${h}時間${m}分`:`${h}時間`;};
  const dow=new Date(date).getDay();
  const dayLabel=`${date.slice(5).replace('-','/')}（${'日月火水木金土'[dow]}）`;
  const facLabel=fac==='kurashiki'?'倉敷':'問屋町';
  const save=()=>{const sH=getStartH(),eH=getEndH();if(eH<=sH){alert('終了時間は開始より後にしてください');return;}if(!staffId&&code!=='休'&&code!=='希'&&code!=='有'){alert('スタッフを選択してください');return;}onSave({shiftCode:code,staffId,facility:fac,customHours:[sH,eH]});};
  return ce(Modal,{title:`タイムライン編集 ─ ${facLabel} ${dayLabel}`,onClose,wide:true},
    ce('div',{style:{marginBottom:14}},
      ce('label',{style:{display:'block',fontSize:11,color:'#6B7280',marginBottom:7,fontWeight:700}},'シフト種別'),
      ce('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
        SHIFT_CODES.map(c=>ce('button',{key:c,onClick:()=>changeCode(c),
          style:{padding:'6px 10px',borderRadius:7,border:`1.5px solid ${code===c?(SHIFT_FG[c]||'#1D4ED8'):'#E2E8F0'}`,
            background:code===c?(SHIFT_BG[c]||'#DBEAFE'):'transparent',
            color:code===c?(SHIFT_FG[c]||'#1D4ED8'):'#374151',
            fontSize:12,fontWeight:code===c?700:400,cursor:'pointer',fontFamily:'inherit'}},c))
      )
    ),
    ce('div',{style:{marginBottom:14}},
      ce('label',{style:{display:'block',fontSize:11,color:'#6B7280',marginBottom:7,fontWeight:700}},'担当スタッフ'),
      ce('select',{value:staffId,onChange:e=>setStaffId(e.target.value),style:{width:'100%',border:'1.5px solid #E2E8F0',borderRadius:8,padding:'9px 10px',fontSize:13,background:'#fff',fontFamily:'inherit'}},
        ce('option',{value:''},'─ 未割当 ─'),
        facStaff.map(s=>ce('option',{key:s.id,value:s.id},`${s.name}（STEP${s.step}）`))
      )
    ),
    ce('div',{style:{marginBottom:14}},
      ce('label',{style:{display:'block',fontSize:11,color:'#6B7280',marginBottom:8,fontWeight:700}},'勤務時間'),
      ce('div',{style:{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}},
        ce('div',null,ce('div',{style:{fontSize:10,color:'#9CA3AF',marginBottom:3}},'開始'),
          ce('input',{type:'time',value:startStr,onChange:e=>setStartStr(e.target.value),style:{border:'1.5px solid #BFDBFE',borderRadius:7,padding:'7px 10px',fontSize:14,fontFamily:'inherit',fontWeight:700,color:'#1D4ED8',background:'#EFF6FF'}})),
        ce('span',{style:{fontSize:16,color:'#CBD5E1',marginTop:14}},'→'),
        ce('div',null,ce('div',{style:{fontSize:10,color:'#9CA3AF',marginBottom:3}},'終了'),
          ce('div',{style:{display:'flex',alignItems:'center',gap:6}},
            ce('input',{type:'time',value:endStr,onChange:e=>setEndStr(e.target.value),style:{border:'1.5px solid #DDD6FE',borderRadius:7,padding:'7px 10px',fontSize:14,fontFamily:'inherit',fontWeight:700,color:'#7C3AED',background:'#F5F3FF'}}),
            ce('label',{style:{fontSize:12,cursor:'pointer',color:'#6B7280',display:'flex',alignItems:'center',gap:4,whiteSpace:'nowrap'}},
              ce('input',{type:'checkbox',checked:endNext,onChange:e=>setEndNext(e.target.checked)}),'翌日')
          )
        ),
        ce('div',{style:{background:'#F8FAFC',borderRadius:8,padding:'7px 12px',marginTop:14}},
          ce('div',{style:{fontSize:9,color:'#9CA3AF',marginBottom:1}},'勤務時間'),
          ce('div',{style:{fontSize:14,fontWeight:700,color:'#374151'}},duration())
        )
      ),
      ce('div',{style:{marginTop:10,height:18,background:'#F1F5F9',borderRadius:5,position:'relative',overflow:'hidden'}},
        (()=>{const sH=getStartH(),eH=getEndH();const l=Math.max(0,(sH-GANTT_START)/GANTT_SPAN*100);const w=Math.min(100-l,(eH-sH)/GANTT_SPAN*100);if(w<=0)return null;return ce('div',{style:{position:'absolute',left:`${l.toFixed(1)}%`,width:`${w.toFixed(1)}%`,top:2,bottom:2,background:GANTT_COLORS[code]||'#CBD5E1',borderRadius:3,display:'flex',alignItems:'center',justifyContent:'center'}},ce('span',{style:{fontSize:8,fontWeight:700,color:'#1E293B',whiteSpace:'nowrap'}},`${toDisplay(sH)}〜${toDisplay(eH)}`));})()
      )
    ),
    ce('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:8,borderTop:'1px solid #F1F5F9'}},
      entry?ce(Btn,{variant:'danger',onClick:()=>{if(confirm('削除しますか？'))onDelete();}},'🗑 削除'):ce('span',null),
      ce('div',{style:{display:'flex',gap:8}},ce(Btn,{onClick:onClose},'キャンセル'),ce(Btn,{variant:'primary',onClick:save},'✓ 保存'))
    )
  );
}

// ── TIMELINE (生HTML方式・高速) ──

function TimelinePage({ym,setYm,staff,shiftData,sharedSpec,specK,specT,onSaveShifts}){
  const[yr,mo]=ym.split('-').map(Number);
  const dim=new Date(yr,mo,0).getDate();
  const facSpec=useMemo(()=>({kurashiki:specK||{},tonya:specT||{}}),[specK,specT]);
  const[selFac,setSelFac]=useState('both');
  const[editTarget,setEditTarget]=useState(null);
  const confirmed=shiftData?._confirmed||false;

  const prev=()=>mo===1?(setYm(`${yr-1}-12`)):(setYm(`${yr}-${String(mo-1).padStart(2,'0')}`));
  const next=()=>mo===12?(setYm(`${yr+1}-01`)):(setYm(`${yr}-${String(mo+1).padStart(2,'0')}`));

  // ── ガントHTML文字列をメモ化（Reactのdiff対象から外す）──
  const ganttHtml=useMemo(()=>{
    const showFacs=selFac==='both'?['kurashiki','tonya']:selFac==='kurashiki'?['kurashiki']:['tonya'];
    const getName=id=>staff.find(s=>s.id===id)?.name||'?';
    let html='';
    for(let d=1;d<=dim;d++){
      const date=ds(yr,mo,d);
      const dow=new Date(yr,mo-1,d).getDay();
      const isHol=sharedSpec[date]?.type==='holiday';
      const isAllClosed=sharedSpec[date]?.type==='closed';
      const isSun=dow===0,isSat=dow===6;
      const dayBg=isSun||isHol?'#FFF0F0':isSat?'#F0F4FF':'#fff';
      const dayColor=isSun||isHol?'#DC2626':isSat?'#2563EB':'#374151';
      const dayEntries=(shiftData?.entries?.[date]||[]);
      const dowStr=DAYS[dow]+(isHol?'祝':'');

      // 施設ごとの行
      const rowsHtml=showFacs.map(fac=>{
        const isFacClosed=facSpec[fac][date]?.type==='closed';
        const facEntries=dayEntries.map((e,idx)=>({...e,_idx:idx})).filter(e=>e.facility===fac);
        const facColor=fac==='kurashiki'?'#1D4ED8':'#7C3AED';
        const facBg=fac==='kurashiki'?'#DBEAFE':'#EDE9FE';
        const facBadge=`<span style="font-size:8px;font-weight:700;color:${facColor};background:${facBg};border-radius:3px;padding:1px 3px;">${fac==='kurashiki'?'倉':'問'}</span>`;

        if(isAllClosed||isFacClosed){
          return `<div style="display:flex;height:26px;border-bottom:1px solid #F1F5F9;background:${dayBg}">
            <div style="width:24px;display:flex;align-items:center;justify-content:center;border-right:1px solid #E2E8F0;flex-shrink:0;">${facBadge}</div>
            <div style="width:58px;display:flex;align-items:center;padding:0 4px;border-right:1px solid #E2E8F0;flex-shrink:0;font-size:10px;color:#9CA3AF;">休業</div>
            <div style="flex:1;background:${dayBg};"></div>
          </div>`;
        }

        if(facEntries.length===0){
          const addBtn=!confirmed?`<button data-add="${JSON.stringify({date,fac}).replace(/"/g,'&quot;')}" style="width:15px;height:15px;border-radius:50%;border:1px solid #CBD5E1;background:#F8FAFC;cursor:pointer;font-size:11px;color:#9CA3AF;flex-shrink:0;padding:0;line-height:1;">+</button>`:'';
          return `<div style="display:flex;height:26px;border-bottom:1px solid #F1F5F9;background:${dayBg}">
            <div style="width:24px;display:flex;align-items:center;justify-content:center;border-right:1px solid #E2E8F0;flex-shrink:0;">${facBadge}</div>
            <div style="width:58px;display:flex;align-items:center;justify-content:space-between;padding:0 3px 0 4px;border-right:1px solid #E2E8F0;flex-shrink:0;gap:2px;overflow:hidden;">
              <span style="font-size:10px;color:#D1D5DB;overflow:hidden;white-space:nowrap;flex:1;">—</span>${addBtn}</div>
            <div style="flex:1;background:${dayBg};"></div>
          </div>`;
        }

        return facEntries.map(e=>{
          const hrs=e.customHours||getHours(e.shiftCode,fac);
          const name=getName(e.staffId);
          const editBtn=!confirmed?`<button data-edit="${JSON.stringify({date,fac,entryIdx:e._idx}).replace(/"/g,'&quot;')}" style="width:15px;height:15px;border-radius:3px;border:1px solid #CBD5E1;background:#F8FAFC;cursor:pointer;font-size:8px;color:#6B7280;flex-shrink:0;padding:0;">✎</button>`:'';
          let barHtml='';
          if(hrs){
            const l=pct(hrs[0]);
            const w=((hrs[1]-hrs[0])/GANTT_SPAN*100).toFixed(3);
            const color=GANTT_COLORS[e.shiftCode]||'#CBD5E1';
            const shadow=e.customHours?'box-shadow:0 0 0 2px #F59E0B inset;':'';
            barHtml=`<div data-edit="${JSON.stringify({date,fac,entryIdx:e._idx}).replace(/"/g,'&quot;')}"
              style="position:absolute;left:${l}%;width:${w}%;top:4px;bottom:4px;
                background:${color};border-radius:4px;${shadow}
                display:flex;align-items:center;padding-left:4px;cursor:${confirmed?'default':'pointer'};">
              <span style="font-size:9px;font-weight:700;color:#1E293B;white-space:nowrap;overflow:hidden;pointer-events:none;">${e.shiftCode}</span>
            </div>`;
          }
          return `<div style="display:flex;height:26px;border-bottom:1px solid #F1F5F9;background:${dayBg}">
            <div style="width:24px;display:flex;align-items:center;justify-content:center;border-right:1px solid #E2E8F0;flex-shrink:0;">${facBadge}</div>
            <div style="width:58px;display:flex;align-items:center;justify-content:space-between;padding:0 3px 0 4px;border-right:1px solid #E2E8F0;flex-shrink:0;gap:2px;overflow:hidden;">
              <span style="font-size:10px;font-weight:600;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;">${name}</span>${editBtn}</div>
            <div style="flex:1;position:relative;overflow:hidden;background:inherit;">${barHtml}</div>
          </div>`;
        }).join('');
      }).join('');

      html+=`<div style="display:flex;border-bottom:1px solid #E5E7EB;">
        <div style="width:46px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
          background:${dayBg};border-right:1px solid #E2E8F0;padding:2px 0;min-height:${showFacs.length*26}px;">
          <span style="font-size:11px;font-weight:700;color:${dayColor};line-height:1.2;">${mo}/${d}</span>
          <span style="font-size:8px;color:${dayColor};line-height:1.3;">${dowStr}</span>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;">${rowsHtml}</div>
      </div>`;
    }
    return html;
  },[dim,yr,mo,selFac,shiftData,sharedSpec,facSpec,staff,confirmed]);

  // クリックはイベント委譲で処理
  const handleGanttClick=useCallback(e=>{
    if(confirmed)return;
    const editEl=e.target.closest('[data-edit]');
    const addEl=e.target.closest('[data-add]');
    if(editEl){
      try{
        const{date,fac,entryIdx}=JSON.parse(editEl.dataset.edit.replace(/&quot;/g,'"'));
        const dayArr=shiftData?.entries?.[date]||[];
        const entry=entryIdx!=null?dayArr[entryIdx]:null;
        setEditTarget({date,fac,entryIdx,entry});
      }catch{}
    }else if(addEl){
      try{
        const{date,fac}=JSON.parse(addEl.dataset.add.replace(/&quot;/g,'"'));
        setEditTarget({date,fac,entryIdx:null,entry:null});
      }catch{}
    }
  },[confirmed,shiftData]);

  const saveEdit=useCallback(async(newEntry)=>{
    if(!editTarget||!onSaveShifts)return;
    const{date,fac,entryIdx}=editTarget;
    const allEntries={...(shiftData?.entries||{})};
    const dayArr=[...(allEntries[date]||[])];
    if(entryIdx!=null&&entryIdx>=0) dayArr[entryIdx]={...dayArr[entryIdx],...newEntry,facility:fac};
    else dayArr.push({...newEntry,facility:fac});
    allEntries[date]=dayArr;
    await onSaveShifts(ym,{...shiftData,entries:allEntries,_confirmed:false});
    setEditTarget(null);
  },[editTarget,shiftData,onSaveShifts,ym]);

  const deleteEdit=useCallback(async()=>{
    if(!editTarget||!onSaveShifts)return;
    const{date,fac,entryIdx}=editTarget;
    const allEntries={...(shiftData?.entries||{})};
    const dayArr=[...(allEntries[date]||[])];
    if(entryIdx!=null&&entryIdx>=0) dayArr.splice(entryIdx,1);
    allEntries[date]=dayArr;
    await onSaveShifts(ym,{...shiftData,entries:allEntries,_confirmed:false});
    setEditTarget(null);
  },[editTarget,shiftData,onSaveShifts,ym]);

  // 時刻ヘッダ
  const hourTicks=useMemo(()=>{
    const ticks=[];
    for(let h=GANTT_START;h<=GANTT_END;h++) ticks.push(h);
    return ticks;
  },[]);

  return ce('div',null,
    ce('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:8}},
      ce('div',{style:{display:'flex',alignItems:'center',gap:10}},
        ce('h2',{style:{fontSize:18,fontWeight:600,margin:0}},'タイムライン'),
        confirmed&&ce('span',{style:{background:'#DCFCE7',color:'#166534',fontSize:11,fontWeight:700,padding:'2px 10px',borderRadius:10,border:'1px solid #86EFAC'}},'✓ 確定済'),
        !confirmed&&shiftData?.entries&&ce('span',{style:{fontSize:11,color:'#94A3B8'}},'バー / ✎ をクリックして編集')
      ),
      ce('div',{style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}},
        ce('div',{style:{display:'flex',gap:4}},
          [{v:'both',l:'両施設'},{v:'kurashiki',l:'倉敷'},{v:'tonya',l:'問屋町'}].map(o=>
            ce('button',{key:o.v,onClick:()=>setSelFac(o.v),
              style:{padding:'4px 10px',borderRadius:6,border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:12,
                fontWeight:selFac===o.v?600:400,background:selFac===o.v?NAVY:'var(--color-background-secondary)',
                color:selFac===o.v?'#fff':'var(--color-text-primary)'}},o.l))
        ),
        ce('button',{onClick:prev,style:{padding:'4px 10px',borderRadius:6,border:'1px solid var(--color-border-secondary)',background:'transparent',cursor:'pointer'}},'◀'),
        ce('span',{style:{fontSize:15,fontWeight:600,minWidth:90,textAlign:'center'}},`${yr}年${mo}月`),
        ce('button',{onClick:next,style:{padding:'4px 10px',borderRadius:6,border:'1px solid var(--color-border-secondary)',background:'transparent',cursor:'pointer'}},'▶'),
        shiftData?.entries&&ce(Btn,{variant:'default',style:{borderColor:'#DC2626',color:'#DC2626',background:'#FFF5F5'},
          onClick:()=>exportTimelinePDF(ym,staff,shiftData,sharedSpec,specK,specT,selFac)},'📄 PDF出力')
      )
    ),

    !shiftData?.entries&&ce('div',{style:{background:'#FEF9C3',border:'1px solid #D97706',borderRadius:8,padding:'10px 14px',marginBottom:12,fontSize:13,color:'#92400E'}},
      '⚠️ シフトがまだ生成されていません。「シフト管理」タブで自動生成してください。'),

    ce('div',{style:{overflowX:'auto',border:'1px solid #E2E8F0',borderRadius:10,overflow:'hidden'}},
      ce('div',{style:{minWidth:640}},
        // 時刻ヘッダ（React管理、1回だけ）
        ce('div',{style:{display:'flex',background:'#F8FAFC',borderBottom:'2px solid #CBD5E1',
          position:'sticky',top:0,zIndex:10,height:26}},
          ce('div',{style:{width:46+24+58,flexShrink:0,borderRight:'1px solid #E2E8F0',
            fontSize:9,color:'#94A3B8',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:600}},'日/施設/氏名'),
          ce('div',{style:{flex:1,position:'relative',overflow:'hidden'}},
            hourTicks.map(h=>ce('div',{key:h,style:{position:'absolute',
              left:`${pct(h)}%`,top:0,bottom:0,
              borderLeft:h>GANTT_START?`1px solid ${h%3===0?'#CBD5E1':'#E2E8F0'}`:'none',
              display:'flex',alignItems:'center'}},
              ce('span',{style:{fontSize:h%3===0?9:7,color:h%6===0?'#475569':h%3===0?'#94A3B8':'#CBD5E1',
                fontWeight:h%6===0?700:400,transform:'translateX(2px)',whiteSpace:'nowrap',lineHeight:1,pointerEvents:'none'}},
                h>=24?`${h-24}:00`:`${h}:00`)
            ))
          )
        ),
        // ガント本体（innerHTML）
        ce('div',{
          dangerouslySetInnerHTML:{__html:ganttHtml},
          onClick:handleGanttClick,
          style:{cursor:'default'}
        })
      )
    ),

// ── LINE SEND MODAL ──
function buildShiftMessage(s,ym,entries,staff){
  const[yr,mo]=ym.split('-').map(Number);
  const dim=new Date(yr,mo,0).getDate();
  const lines=[`【${yr}年${mo}月 シフト確定のお知らせ】`,``,`${s.name}さん、お疲れ様です。`,`来月のシフトをお知らせします。`,``];
  for(let d=1;d<=dim;d++){
    const date=ds(yr,mo,d);
    const dayEntries=(entries[date]||[]).filter(e=>e.staffId===s.id);
    if(dayEntries.length===0)continue;
    const e=dayEntries[0];
    const dow=new Date(yr,mo-1,d).getDay();
    const dayLabel=`${mo}/${d}（${DAYS[dow]}）`;
    if(e.shiftCode==='休'||e.shiftCode==='希')continue;
    const time=e.facility?shiftTime(e.shiftCode,e.facility):'';
    lines.push(`${dayLabel} ${e.shiftCode}${e.facility?` ${FAC_NAME[e.facility]}`:''} ${time}`);
  }
  lines.push('','変更がある場合はマネージャーにご連絡ください。');
  return lines.join('\n');
}

function LINESendModal({ym,staff,shiftData,onClose,lineToken}){
  const[copied,setCopied]=useState({});
  const[sending,setSending]=useState(false);
  const[results,setResults]=useState([]);

  const entries=shiftData?.entries||{};
  const msgs=staff.map(s=>({s,msg:buildShiftMessage(s,ym,entries,staff)}));

  const copy=(id,text)=>{
    navigator.clipboard.writeText(text).then(()=>{setCopied(p=>({...p,[id]:true}));setTimeout(()=>setCopied(p=>({...p,[id]:false})),2000);});
  };

  const exportJSON=()=>{
    const data=msgs.map(({s,msg})=>({lineId:s.lineId,name:s.name,message:msg}));
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`shift_line_${ym}.json`;a.click();
  };

  const sendAll=async()=>{
    if(!lineToken){alert('設定画面でLINE Channel Access Tokenを入力してください');return;}
    setSending(true);const r=[];
    for(const{s,msg}of msgs){
      if(!s.lineId){r.push({name:s.name,status:'スキップ（LINE ID未設定）'});continue;}
      try{
        const res=await fetch('https://api.line.me/v2/bot/message/push',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${lineToken}`},body:JSON.stringify({to:s.lineId,messages:[{type:'text',text:msg}]})});
        r.push({name:s.name,status:res.ok?'✓ 送信成功':`✗ エラー(${res.status})`});
      }catch{r.push({name:s.name,status:'✗ 通信エラー'});}
    }
    setResults(r);setSending(false);
  };

  return ce(Modal,{title:`LINE シフト送信 — ${ym}`,onClose,wide:true},
    ce('div',{style:{background:'#EFF6FF',borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:12,color:'#1E40AF'}},
      '💡 各スタッフのメッセージを確認・コピーできます。「一括送信」はLINE Messaging APIを使用（Channel Access Token要設定）。エルメ経由の場合はJSONエクスポートをご利用ください。'
    ),
    ce('div',{style:{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}},
      ce(Btn,{variant:'primary',onClick:sendAll,disabled:sending},sending?'送信中...':'📤 LINE一括送信'),
      ce(Btn,{onClick:exportJSON},'📦 JSONエクスポート（エルメ用）')
    ),
    results.length>0&&ce('div',{style:{background:'#F0FDF4',borderRadius:8,padding:'10px 14px',marginBottom:12,fontSize:12}},
      results.map(r=>ce('div',{key:r.name},`${r.name}: ${r.status}`))
    ),
    ce('div',{style:{maxHeight:420,overflowY:'auto',display:'flex',flexDirection:'column',gap:10}},
      msgs.map(({s,msg})=>ce('div',{key:s.id,style:{border:'1px solid var(--color-border-tertiary)',borderRadius:8,padding:'10px 14px'}},
        ce('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
          ce('div',null,
            ce('span',{style:{fontWeight:600,fontSize:14}}),
            s.name,
            ce('span',{style:{marginLeft:8,fontSize:11,color:'#9CA3AF'}}),
            s.lineId?s.lineId.slice(0,16)+'…':'LINE ID未設定'
          ),
          ce(Btn,{small:true,variant:copied[s.id]?'success':'default',onClick:()=>copy(s.id,msg)},
            copied[s.id]?'✓ コピー済':'コピー')
        ),
        ce('pre',{style:{fontSize:11,color:'var(--color-text-secondary)',background:'var(--color-background-secondary)',borderRadius:6,padding:'8px 10px',margin:0,whiteSpace:'pre-wrap',maxHeight:140,overflowY:'auto',fontFamily:'inherit',lineHeight:1.6}},msg)
      ))
    )
  );
}

        ce('option',{value:''},'─ 未割当 ─'),

function ShiftsPage({ym,setYm,staff,sharedSpec,specK,specT,prefs,shifts,onSaveShifts}){
  const[yr,mo]=ym.split('-').map(Number);
  const[running,setRunning]=useState(false);
  const[showLine,setShowLine]=useState(false);
  const[editTarget,setEditTarget]=useState(null); // {date,fac,entryIdx,entry}
  const[settings]=useState(()=>{try{return JSON.parse(localStorage.getItem('sv_settings')||'{}')}catch{return{}}});

  const shiftData=shifts[ym];
  const confirmed=shiftData?._confirmed||false;
  const entries=shiftData?.entries||{};
  const alerts=shiftData?.alerts||[];

  const prev=()=>mo===1?(setYm(`${yr-1}-12`)):(setYm(`${yr}-${String(mo-1).padStart(2,'0')}`));
  const next=()=>mo===12?(setYm(`${yr+1}-01`)):(setYm(`${yr}-${String(mo+1).padStart(2,'0')}`));

  const run=async()=>{
    if(confirmed&&!confirm('確定済みシフトを再生成します。確定状態はリセットされます。よろしいですか？'))return;
    setRunning(true);
    await new Promise(r=>setTimeout(r,300));
    const res=generateShifts(ym,staff,sharedSpec||{},specK||{},specT||{},prefs);
    await onSaveShifts(ym,{...res,_confirmed:false});
    setRunning(false);
  };

  const toggleConfirm=async()=>{
    if(!confirmed){
      if(!confirm('シフトを確定します。確定後も編集・解除できます。よろしいですか？'))return;
    }
    await onSaveShifts(ym,{...shiftData,_confirmed:!confirmed});
  };

  // シフト保存（編集）
  const saveEdit=async(newEntry)=>{
    if(!editTarget)return;
    const{date,fac,entryIdx}=editTarget;
    const newEntries={...entries};
    const dayArr=[...(newEntries[date]||[])];
    // 同じfac・同じstaffIdの既存エントリを除去してから追加
    const filtered=dayArr.filter(e=>!(e.facility===fac&&(entryIdx!=null?dayArr.indexOf(e)===entryIdx:false)));
    if(newEntry.staffId||newEntry.shiftCode==='休'||newEntry.shiftCode==='希'||newEntry.shiftCode==='有'){
      // 同じスタッフの同じfacエントリを更新 or 追加
      const idx=entryIdx!=null?entryIdx:-1;
      if(idx>=0&&idx<dayArr.length){
        dayArr[idx]={...dayArr[idx],...newEntry};
      } else {
        dayArr.push({...newEntry});
      }
      newEntries[date]=dayArr;
    }
    await onSaveShifts(ym,{...shiftData,entries:newEntries,_confirmed:false});
    setEditTarget(null);
  };

  const deleteEdit=async()=>{
    if(!editTarget)return;
    const{date,fac,entryIdx}=editTarget;
    const newEntries={...entries};
    const dayArr=[...(newEntries[date]||[])];
    if(entryIdx!=null) dayArr.splice(entryIdx,1);
    newEntries[date]=dayArr;
    await onSaveShifts(ym,{...shiftData,entries:newEntries,_confirmed:false});
    setEditTarget(null);
  };

  const addShift=(date,fac)=>{
    setEditTarget({date,fac,entryIdx:null,entry:null});
  };

  const dim=new Date(yr,mo,0).getDate();
  const getName=id=>staff.find(s=>s.id===id)?.name||id;

  return ce('div',null,
    // ── ヘッダ ──
    ce('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}},
      ce('div',{style:{display:'flex',alignItems:'center',gap:10}},
        ce('h2',{style:{fontSize:18,fontWeight:600,margin:0}},'シフト管理'),
        confirmed&&ce('span',{style:{background:'#DCFCE7',color:'#166534',fontSize:11,fontWeight:700,padding:'2px 10px',borderRadius:10,border:'1px solid #86EFAC'}},'✓ 確定済')
      ),
      ce('div',{style:{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}},
        ce('button',{onClick:prev,style:{padding:'4px 10px',borderRadius:6,border:'1px solid var(--color-border-secondary)',background:'transparent',cursor:'pointer'}},'◀'),
        ce('span',{style:{fontSize:15,fontWeight:600,minWidth:90,textAlign:'center'}},`${yr}年${mo}月`),
        ce('button',{onClick:next,style:{padding:'4px 10px',borderRadius:6,border:'1px solid var(--color-border-secondary)',background:'transparent',cursor:'pointer'}},'▶'),
        ce(Btn,{variant:'primary',onClick:run,disabled:running||staff.length===0},running?'生成中…':'⚡ 自動生成'),
        shiftData&&!confirmed&&ce(Btn,{variant:'success',onClick:toggleConfirm},'✓ 確定する'),
        shiftData&&confirmed&&ce(Btn,{variant:'warning',onClick:toggleConfirm},'🔓 確定解除'),
        shiftData&&ce(Btn,{variant:'primary',style:{background:'#06B6D4'},onClick:()=>setShowLine(true)},'📱 LINE送信'),
        shiftData&&ce(Btn,{variant:'default',style:{borderColor:'#DC2626',color:'#DC2626',background:'#FFF5F5'},onClick:()=>exportShiftPDF(ym,staff,shiftData,sharedSpec||{},specK||{},specT||{})},'📄 PDF出力')
      )
    ),

    // 編集モード案内
    shiftData&&!confirmed&&ce('div',{style:{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:8,padding:'7px 12px',marginBottom:10,fontSize:12,color:'#1E40AF',display:'flex',alignItems:'center',gap:6}},
      '✏️ 各シフトの「編集」ボタンで担当者・シフト種別を変更できます。変更すると確定状態が解除されます。'),
    shiftData&&confirmed&&ce('div',{style:{background:'#F0FDF4',border:'1px solid #86EFAC',borderRadius:8,padding:'7px 12px',marginBottom:10,fontSize:12,color:'#166534',display:'flex',alignItems:'center',gap:6}},
      '🔒 確定済みです。変更する場合は「確定解除」ボタンを押してから編集してください。'),

    staff.length===0&&ce('div',{style:{background:'#FEE2E2',borderRadius:8,padding:'10px 14px',marginBottom:12,fontSize:13,color:'#B91C1C'}},'⚠ スタッフが登録されていません'),

    alerts.length>0&&ce('div',{style:{marginBottom:12}},
      ce('div',{style:{fontWeight:600,fontSize:13,marginBottom:6,color:'#B91C1C'}},`⚠ アラート ${alerts.length}件`),
      alerts.slice(0,5).map(a=>ce('div',{key:a.id,style:{background:a.type==='no_staff'?'#FEF2F2':'#FEF9C3',borderRadius:6,padding:'5px 10px',marginBottom:4,fontSize:12,color:a.type==='no_staff'?'#B91C1C':'#92400E'}},a.msg)),
      alerts.length>5&&ce('div',{style:{fontSize:12,color:'var(--color-text-secondary)',marginTop:4}},`他 ${alerts.length-5}件`)
    ),

    shiftData
      ?ce('div',{style:{overflowX:'auto'}},
        ce('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:12,minWidth:560}},
          ce('thead',null,ce('tr',{style:{background:'var(--color-background-secondary)',position:'sticky',top:0,zIndex:2}},
            ['日','曜','倉敷','問屋町'].map(h=>ce('th',{key:h,style:{padding:'8px 10px',textAlign:'left',fontWeight:500,fontSize:11,color:'var(--color-text-secondary)',borderBottom:'2px solid var(--color-border-tertiary)',whiteSpace:'nowrap'}},h))
          )),
          ce('tbody',null,
            Array.from({length:dim},(_,i)=>{
              const d=i+1,date=ds(yr,mo,d);
              const es=entries[date]||[];
              const dow=new Date(yr,mo-1,d).getDay();
              const isAllClosed=sharedSpec[date]?.type==='closed';
              const byFac={
                kurashiki:es.map((e,idx)=>({...e,_idx:idx})).filter(e=>e.facility==='kurashiki'),
                tonya:es.map((e,idx)=>({...e,_idx:idx})).filter(e=>e.facility==='tonya')
              };
              const isSun=dow===0,isSat=dow===6,isHol=sharedSpec[date]?.type==='holiday';
              const rowBg=isAllClosed?'#F9FAFB':isSun||isHol?'#FFF5F5':isSat?'#F8F8FF':'';
              return ce('tr',{key:d,style:{borderBottom:'1px solid var(--color-border-tertiary)',background:rowBg,verticalAlign:'top'}},
                ce('td',{style:{padding:'8px 10px',fontWeight:600,color:isSun||isHol?'#EF4444':isSat?'#3B82F6':'var(--color-text-primary)',whiteSpace:'nowrap'}},`${mo}/${d}`),
                ce('td',{style:{padding:'8px 10px',color:isSun||isHol?'#EF4444':isSat?'#3B82F6':'var(--color-text-secondary)'}},DAYS[dow]+(isHol?'🎌':'')+(sharedSpec[date]?.type==='event'?'🎪':'')),
                isAllClosed
                  ?ce('td',{colSpan:2,style:{padding:'8px 10px',color:'#9CA3AF',fontStyle:'italic',fontSize:12}},'全体休業')
                  :ce(React.Fragment,null,
                    ['kurashiki','tonya'].map(fac=>{
                      const isFacClosed=(fac==='kurashiki'?specK:specT)[date]?.type==='closed';
                      return ce('td',{key:fac,style:{padding:'6px 10px'}},
                        isFacClosed
                          ?ce('span',{style:{fontSize:11,color:'#9CA3AF'}},'休業')
                          :ce('div',{style:{display:'flex',flexDirection:'column',gap:4}},
                            // 既存エントリ
                            byFac[fac].map((e,i)=>ce('div',{key:i,style:{display:'flex',alignItems:'center',gap:4}},
                              ce(ShiftBadge,{code:e.shiftCode}),
                              ce('span',{style:{fontSize:11,color:'var(--color-text-primary)'}},getName(e.staffId)),
                              !confirmed&&ce('button',{
                                onClick:()=>setEditTarget({date,fac,entryIdx:e._idx,entry:e}),
                                style:{background:'transparent',border:'1px solid #CBD5E1',borderRadius:4,padding:'1px 5px',fontSize:10,cursor:'pointer',color:'#6B7280',marginLeft:2,lineHeight:1.4}
                              },'編集')
                            )),
                            // 追加ボタン
                            !confirmed&&ce('button',{
                              onClick:()=>addShift(date,fac),
                              style:{display:'inline-flex',alignItems:'center',gap:2,background:'transparent',border:'1px dashed #CBD5E1',borderRadius:4,padding:'2px 7px',fontSize:10,cursor:'pointer',color:'#9CA3AF',marginTop:2,width:'fit-content'}
                            },'＋ 追加')
                          )
                      );
                    })
                  )
              );
            })
          )
        )
      )
      :ce('div',{style:{padding:40,textAlign:'center',color:'var(--color-text-secondary)',fontSize:14}},'「⚡ 自動生成」ボタンでシフトを生成してください'),

    // 編集モーダル
    editTarget&&ce(ShiftEditModal,{
      date:editTarget.date,
      fac:editTarget.fac,
      entry:editTarget.entry,
      staff,
      onSave:saveEdit,
      onDelete:deleteEdit,
      onClose:()=>setEditTarget(null)
    }),

    showLine&&ce(LINESendModal,{ym,staff,shiftData,onClose:()=>setShowLine(false),lineToken:settings.lineToken||''})
  );
}

// ── SETTINGS PAGE ──
function SettingsPage({syncFromGas,syncStatus}){
  const[s,setS]=useState(()=>{try{return JSON.parse(localStorage.getItem('sv_settings')||'{}')}catch{return{}}});
  const[gasUrl,setGasUrlState]=useState(()=>getGasUrl());
  const isHardcoded=!!HARDCODED_GAS_URL;
  const[saved,setSaved]=useState(false);
  const[testing,setTesting]=useState(false);
  const[testResult,setTestResult]=useState(null);
  const set=(k,v)=>setS(p=>({...p,[k]:v}));

  const save=()=>{
    localStorage.setItem('sv_settings',JSON.stringify(s));
    setGasUrl(gasUrl.trim());
    setSaved(true);setTimeout(()=>setSaved(false),2500);
  };

  const testGas=async()=>{
    const url=gasUrl.trim();
    if(!url){setTestResult({ok:false,msg:'URLを入力してください'});return;}
    setTesting(true);setTestResult(null);
    try{
      const res=await fetch(url+'?action=getAll');
      const json=await res.json();
      if(json.ok){setTestResult({ok:true,msg:'✓ 接続成功！データを正常に取得できました'});}
      else{setTestResult({ok:false,msg:'接続はできましたがエラー: '+json.error});}
    }catch(e){setTestResult({ok:false,msg:'接続失敗: '+e.message});}
    setTesting(false);
  };

  return ce('div',null,
    ce('h2',{style:{fontSize:18,fontWeight:600,marginBottom:16}},'設定'),

    // GAS設定セクション
    ce('div',{style:{border:'1px solid var(--color-border-tertiary)',borderRadius:10,padding:20,maxWidth:580,marginBottom:16}},
      ce('div',{style:{fontWeight:700,fontSize:14,marginBottom:4,color:'#0F2D52'}},'🔗 Google Apps Script 連携'),
      ce('div',{style:{fontSize:12,color:'#6B7280',marginBottom:14}},'複数人・複数端末でデータを共有するためのGAS URLを設定します'),

      ce('div',{style:{marginBottom:12}},
        ce('label',{style:{display:'block',fontSize:12,color:'var(--color-text-secondary)',marginBottom:4,fontWeight:600}},'GAS ウェブアプリ URL'),
        isHardcoded
          ?ce('div',{style:{padding:'8px 12px',borderRadius:6,background:'#F0FDF4',border:'1px solid #86EFAC',fontSize:12,color:'#166534'}},
            '✓ HTMLに直接埋め込み済み（変更はHTMLファイルのHARDCODED_GAS_URLを編集）')
          :ce('input',{value:gasUrl,onChange:e=>setGasUrlState(e.target.value),
            placeholder:'https://script.google.com/macros/s/xxxxxxxxx/exec',
            style:{width:'100%',boxSizing:'border-box',border:'1px solid var(--color-border-secondary)',
              borderRadius:6,padding:'7px 10px',fontSize:12,background:'var(--color-background-primary)',
              color:'var(--color-text-primary)',fontFamily:'inherit'}})
      ),
      ce('div',{style:{marginBottom:14}},
        ce('label',{style:{display:'block',fontSize:12,color:'var(--color-text-secondary)',marginBottom:4,fontWeight:600}},'オペレーター名（更新ログに記録）'),
        ce(Inp,{value:s.operatorName||'',onChange:v=>set('operatorName',v),placeholder:'例：田中（管理者）'})
      ),

      ce('div',{style:{background:'#F0FDF4',border:'1px solid #86EFAC',borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:12,color:'#166534'}},
        ce('div',{style:{fontWeight:700,marginBottom:4}},'📋 GAS設定手順'),
        ce('div',null,'1. Google スプレッドシートを新規作成'),
        ce('div',null,'2. 拡張機能 → Apps Script を開く'),
        ce('div',null,'3. Code.gs の内容を貼り付けて保存'),
        ce('div',null,'4. デプロイ → 新しいデプロイ → ウェブアプリ'),
        ce('div',null,'5. 実行: 自分、アクセス: 全員 → デプロイ'),
        ce('div',null,'6. 表示されたURLをここに貼り付けて保存')
      ),

      ce('div',{style:{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}},
        ce(Btn,{variant:'primary',onClick:save},'保存'),
        ce(Btn,{onClick:testGas,disabled:testing},testing?'テスト中…':'🔌 接続テスト'),
        ce(Btn,{onClick:()=>syncFromGas&&syncFromGas(),disabled:syncStatus==='syncing'},
          syncStatus==='syncing'?'同期中…':'🔄 今すぐ同期'),
        saved&&ce('span',{style:{fontSize:12,color:'#059669',fontWeight:600}},'✓ 保存しました')
      ),
      testResult&&ce('div',{style:{marginTop:10,padding:'8px 12px',borderRadius:8,fontSize:12,
        background:testResult.ok?'#F0FDF4':'#FFF5F5',
        color:testResult.ok?'#166534':'#B91C1C',
        border:'1px solid '+(testResult.ok?'#86EFAC':'#FCA5A5')}},
        testResult.msg)
    ),

    // パスワード変更セクション
    ce('div',{style:{border:'1px solid var(--color-border-tertiary)',borderRadius:10,padding:20,maxWidth:580,marginBottom:16}},
      ce('div',{style:{fontWeight:700,fontSize:14,marginBottom:4,color:'#0F2D52'}},'🔐 管理者パスワード変更'),
      ce('div',{style:{fontSize:12,color:'#6B7280',marginBottom:14}},'現在のパスワードを確認してから新しいパスワードを設定します'),
      ce('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}},
        ce('div',null,
          ce('label',{style:{display:'block',fontSize:12,color:'var(--color-text-secondary)',marginBottom:4,fontWeight:600}},'現在のパスワード'),
          ce('input',{type:'password',value:s.currentPw||'',onChange:e=>set('currentPw',e.target.value),
            style:{width:'100%',boxSizing:'border-box',border:'1px solid var(--color-border-secondary)',
              borderRadius:6,padding:'7px 10px',fontSize:13,background:'var(--color-background-primary)',fontFamily:'inherit'}})
        ),
        ce('div',null,
          ce('label',{style:{display:'block',fontSize:12,color:'var(--color-text-secondary)',marginBottom:4,fontWeight:600}},'新しいパスワード'),
          ce('input',{type:'password',value:s.newPw||'',onChange:e=>set('newPw',e.target.value),
            style:{width:'100%',boxSizing:'border-box',border:'1px solid var(--color-border-secondary)',
              borderRadius:6,padding:'7px 10px',fontSize:13,background:'var(--color-background-primary)',fontFamily:'inherit'}})
        )
      ),
      ce('div',{style:{display:'flex',gap:8,alignItems:'center'}},
        ce(Btn,{onClick:()=>{
          const saved=getAdminPw();
          if(saved&&s.currentPw!==saved){alert('現在のパスワードが正しくありません');return;}
          if(!s.newPw||s.newPw.length<4){alert('新しいパスワードは4文字以上で入力してください');return;}
          localStorage.setItem(ADMIN_PW_KEY,s.newPw);
          set('currentPw','');set('newPw','');
          alert('パスワードを変更しました');
        }},'パスワード変更')
      )
    ),

    // LINE設定セクション
    ce('div',{style:{border:'1px solid var(--color-border-tertiary)',borderRadius:10,padding:20,maxWidth:580}},
      ce('div',{style:{fontWeight:700,fontSize:14,marginBottom:14,paddingBottom:10,borderBottom:'1px solid var(--color-border-tertiary)'}},'📱 LINE Messaging API'),
      ce(Inp,{label:'Channel Access Token',value:s.lineToken||'',onChange:v=>set('lineToken',v),placeholder:'LINE Messaging API Channel Access Token'}),
      ce('div',{style:{background:'#EFF6FF',borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:12,color:'#1D4ED8'}},
        '💡 LINE DevelopersコンソールのMessaging API設定から取得できます。エルメを使用する場合はエルメのAPI設定でアクセストークンを確認してください。'
      )
    )
  );
}

  const[yr,mo]=ym.split('-').map(Number);

  const isOver=today>deadline;
  const overdue=staff.filter(s=>!prefs[`${s.id}_${ym}`]?.submitted);
  const shiftData=shifts[ym];
  const confirmed=shiftData?._confirmed||false;
  const alertCount=(shiftData?.alerts||[]).length;

  const stats=[
    {l:'登録スタッフ数',v:staff.length+'名'},
    {l:'シフト状態',v:confirmed?'✓ 確定済':shiftData?'生成済（未確定）':'未生成'},
    {l:'アラート',v:alertCount>0?`⚠ ${alertCount}件`:'なし',c:alertCount>0?'#B91C1C':'inherit'},
    {l:'希望未提出',v:isOver&&overdue.length>0?`⚠ ${overdue.length}名`:overdue.length+'名',c:isOver&&overdue.length>0?'#B91C1C':'inherit'},

  return ce('div',null,

        ce('div',{style:{fontSize:11,color:'var(--color-text-secondary)',marginBottom:4}},s.l),
        ce('div',{style:{fontSize:18,fontWeight:600,color:s.c||'inherit'}},s.v)
      ))
    ),
    isOver&&overdue.length>0&&ce('div',{style:{background:'#FEF9C3',border:'1px solid #D97706',borderRadius:8,padding:'10px 14px',marginBottom:14}},
      ce('div',{style:{fontWeight:600,fontSize:13,color:'#92400E',marginBottom:6}},'⚠️ 希望休未提出スタッフ'),
      overdue.map(s=>ce('div',{key:s.id,style:{fontSize:13,color:'#92400E'}},`・${s.name}（${s.inputMethod}方式）`))
    ),
    ce('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}},
      ce('div',{style:{border:'1px solid var(--color-border-tertiary)',borderRadius:8,padding:'12px 14px'}},
        ce('div',{style:{fontWeight:500,fontSize:13,marginBottom:8}},'スタッフ内訳'),
        ce('div',{style:{fontSize:13,color:'var(--color-text-secondary)'}},`倉敷: ${staff.filter(s=>s.facilities?.includes('kurashiki')).length}名`),
        ce('div',{style:{fontSize:13,color:'var(--color-text-secondary)'}},`問屋町: ${staff.filter(s=>s.facilities?.includes('tonya')).length}名`),

function StaffLoginPage({staff,onLogin}){
  const[pin,setPin]=useState('');
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);

  const handleLogin=async()=>{
    if(pin.length<4){setErr('4桁のPINを入力してください');return;}
    setLoading(true);setErr('');
    // PINで照合
    const found=staff.find(s=>s.pin===pin);
    if(found){
      onLogin(found);
    } else {
      setErr('PINが正しくありません');
    }
    setLoading(false);
  };

  const handleKey=e=>{if(e.key==='Enter')handleLogin();};

  return ce('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
    background:'linear-gradient(135deg,#0F2D52 0%,#1C508A 100%)',padding:16}},
    ce('div',{style:{background:'#fff',borderRadius:20,padding:40,maxWidth:360,width:'100%',
      boxShadow:'0 20px 60px rgba(0,0,0,0.3)',textAlign:'center'}},
      ce('div',{style:{fontSize:48,marginBottom:8}},'📅'),
      ce('div',{style:{fontSize:22,fontWeight:800,color:'#0F2D52',marginBottom:4}},'スタジオバース'),
      ce('div',{style:{fontSize:14,color:'#6B7280',marginBottom:32}},'希望休入力ページ'),
      ce('div',{style:{marginBottom:16}},
        ce('label',{style:{display:'block',fontSize:12,fontWeight:700,color:'#374151',marginBottom:8,textAlign:'left'}},'PINコード（4桁）'),
        ce('input',{
          type:'password',
          value:pin,
          onChange:e=>setPin(e.target.value.replace(/\D/g,'').slice(0,4)),
          onKeyDown:handleKey,
          placeholder:'● ● ● ●',
          maxLength:4,
          autoFocus:true,
          style:{width:'100%',boxSizing:'border-box',border:'2px solid #E2E8F0',borderRadius:12,
            padding:'14px 16px',fontSize:28,textAlign:'center',letterSpacing:'0.3em',
            outline:'none',color:'#0F2D52',fontWeight:700,
            transition:'border-color 0.15s'}
        })
      ),
      err&&ce('div',{style:{color:'#EF4444',fontSize:13,marginBottom:12,fontWeight:600}},err),
      ce('button',{
        onClick:handleLogin,
        disabled:loading||pin.length<4,
        style:{width:'100%',padding:'14px',borderRadius:12,border:'none',
          background:pin.length===4?'#0F2D52':'#E5E7EB',
          color:pin.length===4?'#fff':'#9CA3AF',
          fontSize:15,fontWeight:700,cursor:pin.length===4?'pointer':'not-allowed',
          transition:'all 0.2s'}
      },loading?'確認中…':'ログイン'),
      ce('div',{style:{marginTop:20,fontSize:11,color:'#9CA3AF'}},'PINはマネージャーに確認してください')
    )
  );
}

function StaffPortalPage({staffMember,ym,setYm,prefs,onSavePref,onLogout}){
  const[yr,mo]=ym.split('-').map(Number);
  const dim=new Date(yr,mo,0).getDate();
  const first=new Date(yr,mo-1,1).getDay();
  const[saved,setSaved]=useState(false);

  const mKey=`${staffMember.id}_${ym}`;
  const pref=prefs[mKey]||{dates:[],submitted:false};
  const[dates,setDates]=useState(pref.dates||[]);
  const[method]=useState(staffMember.inputMethod||'希望休');

  // 月が変わったらGASから最新データを取得してdatesをセット
  const ymRef=React.useRef(ym);
  const[loading,setLoading]=useState(false);
  useEffect(()=>{
    const loadLatest=async()=>{
      setLoading(true);
      // GASから最新の自分のprefを取得
      const latest=await gasGetPref(staffMember.id,ym);
      if(latest){
        setDates(latest.dates||[]);
      } else {
        // フォールバック: propsから
        const p=prefs[`${staffMember.id}_${ym}`]||{dates:[]};
        setDates(p.dates||[]);
      }
      setLoading(false);
      setSaved(false);
    };
    if(ymRef.current!==ym||ymRef.current===ym){
      ymRef.current=ym;
      loadLatest();
    }
  },[ym,staffMember.id]);

  const toggleDate=date=>{
    setDates(prev=>prev.includes(date)?prev.filter(x=>x!==date):[...prev,date]);
    setSaved(false);
  };

  const[saving,setSaving]=useState(false);
  const save=async()=>{
    setSaving(true);
    try{
      const data={dates,submitted:true,submittedAt:new Date().toISOString()};
      await onSavePref(staffMember.id,ym,data);
      setSaved(true);
      setTimeout(()=>setSaved(false),4000);
    }catch(e){
      alert('保存に失敗しました。通信を確認してもう一度お試しください。');
    }finally{
      setSaving(false);
    }
  };

  const prev=()=>mo===1?(setYm(`${yr-1}-12`)):(setYm(`${yr}-${String(mo-1).padStart(2,'0')}`));
  const next=()=>mo===12?(setYm(`${yr+1}-01`)):(setYm(`${yr}-${String(mo+1).padStart(2,'0')}`));

  // 締切チェック
  const deadline=new Date(yr,mo-2,20);
  const isOver=new Date()>deadline;

  if(loading) return ce('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
    background:'linear-gradient(135deg,#0F2D52 0%,#1C508A 100%)'}},
    ce('div',{style:{textAlign:'center',color:'#fff'}},
      ce('div',{style:{fontSize:32,marginBottom:12}},'📅'),
      ce('div',{style:{fontSize:15,fontWeight:600}},'データを読み込み中…')
    )
  );

  return ce('div',{style:{minHeight:'100vh',background:'#F8FAFC',fontFamily:'var(--font-sans)'}},
    // ヘッダー
    ce('div',{style:{background:'#0F2D52',padding:'14px 20px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
      ce('div',null,
        ce('div',{style:{color:'#93C5FD',fontSize:11,fontWeight:500}},'スタジオバース'),
        ce('div',{style:{color:'#fff',fontSize:14,fontWeight:700}},'希望休入力')
      ),
      ce('div',{style:{display:'flex',alignItems:'center',gap:12}},
        ce('div',{style:{textAlign:'right'}},
          ce('div',{style:{color:'#fff',fontSize:13,fontWeight:700}}),
          staffMember.name,
          ce('div',{style:{color:'#93C5FD',fontSize:11}}),
          staffMember.title||'スタッフ'
        ),
        ce('button',{onClick:onLogout,
          style:{padding:'6px 12px',borderRadius:8,border:'1px solid rgba(255,255,255,0.3)',
            background:'transparent',color:'rgba(255,255,255,0.7)',fontSize:12,cursor:'pointer',
            fontFamily:'inherit'}
        },'ログアウト')
      )
    ),

    // コンテンツ
    ce('div',{style:{maxWidth:500,margin:'0 auto',padding:'20px 16px'}},

      // 月ナビ
      ce('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}},
        ce('button',{onClick:prev,style:{padding:'8px 14px',borderRadius:8,border:'1px solid #E2E8F0',background:'#fff',cursor:'pointer',fontSize:16}},'◀'),
        ce('div',{style:{textAlign:'center'}},
          ce('div',{style:{fontSize:18,fontWeight:800,color:'#0F2D52'}}),`${yr}年${mo}月`,
          ce('div',{style:{fontSize:12,color:isOver?'#EF4444':'#6B7280',fontWeight:isOver?700:400}},
            isOver?'⚠ 締切を過ぎています':`締切：${yr}年${mo===1?12:mo-1}月20日`)
        ),
        ce('button',{onClick:next,style:{padding:'8px 14px',borderRadius:8,border:'1px solid #E2E8F0',background:'#fff',cursor:'pointer',fontSize:16}},'▶')
      ),

      // 入力方式バッジ
      ce('div',{style:{textAlign:'center',marginBottom:14}},
        ce('span',{style:{
          background:method==='希望休'?'#FEE2E2':'#DBEAFE',
          color:method==='希望休'?'#B91C1C':'#1D4ED8',
          padding:'4px 14px',borderRadius:20,fontSize:12,fontWeight:700
        }},method==='希望休'?'🔴 希望休方式（休みたい日をタップ）':'🔵 希望出勤方式（出勤できる日をタップ）')
      ),

      // カレンダー
      ce('div',{style:{background:'#fff',borderRadius:16,border:'1.5px solid #E2E8F0',padding:16,marginBottom:16,boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}},
        // 曜日ヘッダ
        ce('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginBottom:8}},
          ['日','月','火','水','木','金','土'].map((d,i)=>ce('div',{key:d,style:{
            textAlign:'center',fontSize:12,fontWeight:700,padding:'4px 0',
            color:i===0?'#EF4444':i===6?'#3B82F6':'#9CA3AF'
          }},d))
        ),
        // 日付グリッド
        ce('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}},
          Array.from({length:first}).map((_,i)=>ce('div',{key:'e'+i})),
          Array.from({length:dim},(_,i)=>{
            const d=i+1;
            const date=`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dow=new Date(yr,mo-1,d).getDay();
            const sel=dates.includes(date);
            const isSun=dow===0,isSat=dow===6;
            // 選択色: 希望休=赤, 希望出勤=青
            const selBg=method==='希望休'?'#EF4444':'#1D4ED8';
            const selColor='#fff';
            const normalColor=isSun?'#EF4444':isSat?'#3B82F6':'#374151';
            const normalBg=isSun?'#FFF5F5':isSat?'#F0F4FF':'#F9FAFB';
            return ce('button',{key:d,
              onClick:()=>!isOver&&toggleDate(date),
              disabled:isOver,
              style:{
                aspectRatio:'1',padding:'2px',borderRadius:10,border:'none',cursor:isOver?'not-allowed':'pointer',
                background:sel?selBg:normalBg,
                color:sel?selColor:normalColor,
                fontSize:14,fontWeight:sel?800:500,
                transition:'all 0.15s',
                boxShadow:sel?'0 2px 6px rgba(0,0,0,0.2)':'none',
                transform:sel?'scale(1.05)':'scale(1)',
                opacity:isOver?0.6:1
              }
            },d);
          })
        )
      ),

      // 選択状況サマリー
      ce('div',{style:{background:'#fff',borderRadius:12,border:'1.5px solid #E2E8F0',padding:'12px 16px',marginBottom:16}},
        ce('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:dates.length>0?8:0}},
          ce('div',{style:{fontSize:13,color:'#374151',fontWeight:600}},
            method==='希望休'
              ?`希望休：${dates.length}日選択中`
              :`希望出勤：${dates.length}日選択中`
          ),
          dates.length>0&&ce('button',{
            onClick:()=>{setDates([]);setSaved(false);},
            style:{fontSize:11,color:'#6B7280',background:'#F3F4F6',border:'none',borderRadius:6,padding:'3px 8px',cursor:'pointer'}
          },'クリア')
        ),
        dates.length>0&&ce('div',{style:{display:'flex',flexWrap:'wrap',gap:4}},
          dates.sort().map(d=>ce('span',{key:d,style:{
            background:method==='希望休'?'#FEE2E2':'#DBEAFE',
            color:method==='希望休'?'#B91C1C':'#1D4ED8',
            padding:'2px 8px',borderRadius:6,fontSize:11,fontWeight:600
          }},`${parseInt(d.slice(5,7))}/${parseInt(d.slice(8,10))}日`))
        )
      ),

      // 保存ボタン
      !isOver&&ce('button',{
        onClick:save,
        disabled:saving,
        style:{width:'100%',padding:'16px',borderRadius:14,border:'none',
          background:saving?'#6B7280':saved?'#059669':'#0F2D52',
          color:'#fff',fontSize:16,fontWeight:700,
          cursor:saving?'not-allowed':'pointer',
          boxShadow:'0 4px 14px rgba(15,45,82,0.3)',transition:'all 0.2s',
          marginBottom:8}
      },saving?'⏳ 保存中…':saved?'✓ 保存しました！':'💾 希望を保存する'),
      saved&&ce('div',{style:{textAlign:'center',fontSize:13,color:'#059669',fontWeight:600,
        animation:'fadeIn 0.3s ease',marginBottom:8}},
        '管理者に送信されました'),

      // 既に提出済みバッジ
      pref.submitted&&ce('div',{style:{textAlign:'center',padding:'8px',borderRadius:8,
        background:'#F0FDF4',border:'1px solid #86EFAC',fontSize:12,color:'#166534',marginBottom:8}},
        `✓ 提出済み（${pref.submittedAt?new Date(pref.submittedAt).toLocaleDateString('ja-JP'):''}）`
      )
    ),
    ce('style',null,'@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}')
  );
}

      localStorage.setItem(ADMIN_PW_KEY,pw);
